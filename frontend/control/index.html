<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robot Control — 人形机器人控制面板</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <!-- TOPBAR -->
    <header class="topbar">
      <div class="logo">
        <span class="logo-icon">◼</span>
        <span class="logo-text">HUMANOID CONTROL</span>
      </div>
      <div class="topbar-center">
        <span class="badge" id="mode-badge">IDLE</span>
        <span class="conn" id="conn-indicator">
          <span class="conn-dot" id="conn-dot"></span>
          <span id="conn-label">连接中...</span>
        </span>
      </div>
      <div class="topbar-right">
        <a href="/scheduler" class="nav-link">任务调度 →</a>
        <span class="time" id="clock">--:--:--</span>
      </div>
    </header>

    <div class="main">
      <!-- LEFT: Status Panel -->
      <aside class="sidebar left">
        <div class="panel">
          <div class="panel-title">🤖 机器人状态</div>

          <div class="metric">
            <div class="metric-label">电池电量</div>
            <div class="metric-row">
              <span class="metric-value" id="val-battery">87</span>
              <span class="metric-unit">%</span>
            </div>
            <div class="bar-track"><div class="bar-fill" id="bar-battery" style="width:87%"></div></div>
          </div>

          <div class="metric">
            <div class="metric-label">CPU 负载</div>
            <div class="metric-row">
              <span class="metric-value" id="val-cpu">42</span>
              <span class="metric-unit">%</span>
            </div>
            <div class="bar-track"><div class="bar-fill cpu" id="bar-cpu" style="width:42%"></div></div>
          </div>

          <div class="metric">
            <div class="metric-label">速度</div>
            <div class="metric-row">
              <span class="metric-value" id="val-speed">0.0</span>
              <span class="metric-unit">m/s</span>
            </div>
          </div>

          <div class="metric">
            <div class="metric-label">位移</div>
            <div class="metric-row">
              <span class="metric-value" id="val-dist">0.0</span>
              <span class="metric-unit">m</span>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-title">姿态</div>
          <div class="ori-row"><span>Roll</span><span class="mono" id="val-roll">0.0°</span></div>
          <div class="ori-row"><span>Pitch</span><span class="mono" id="val-pitch">0.0°</span></div>
          <div class="ori-row"><span>Yaw</span><span class="mono" id="val-yaw">0.0°</span></div>
        </div>

        <div class="panel">
          <div class="panel-title">关节状态</div>
          <div id="joint-list">
            <div class="joint-row"><span>左膝关节</span><span class="tag ok">正常</span></div>
            <div class="joint-row"><span>右膝关节</span><span class="tag ok">正常</span></div>
            <div class="joint-row"><span>髋关节</span><span class="tag warn">微热</span></div>
            <div class="joint-row"><span>左肩关节</span><span class="tag ok">正常</span></div>
            <div class="joint-row"><span>右肩关节</span><span class="tag ok">正常</span></div>
            <div class="joint-row"><span>颈部</span><span class="tag ok">正常</span></div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-title">障碍物</div>
          <div class="dist-bar">
            <span class="dist-label">前方距离</span>
            <div class="dist-track"><div class="dist-fill" id="dist-fill" style="width:100%"></div></div>
            <span class="dist-val" id="dist-val">安全</span>
          </div>
        </div>

        <div class="panel">
          <div class="panel-title">📍 2D 导航位置</div>
          <div class="nav-mini" id="nav-mini">
            <div class="nav-mini-row"><span>坐标:</span> <b id="ctrl-nav-xy">--</b></div>
            <div class="nav-mini-row"><span>航向:</span> <b id="ctrl-nav-yaw">--</b>°</div>
            <div class="nav-mini-row"><span>距终点:</span> <b id="ctrl-nav-dist">--</b>m</div>
            <div class="progress-track" style="margin-top:6px"><div class="progress-bar" id="ctrl-nav-bar" style="width:0%"></div></div>
            <div class="nav-mini-row" style="margin-top:4px"><span>进度:</span> <b id="ctrl-nav-pct">0%</b></div>
          </div>
        </div>
      </aside>

      <!-- CENTER: Video + Controls -->
      <section class="center">
        <div class="video-panel">
          <div class="video-overlay">
            <span id="cam-label">CAM-FRONT · 640×480 · 30fps</span>
            <span id="det-label"></span>
          </div>
          <canvas id="cam-canvas" width="640" height="360"></canvas>
          <img id="cam-real" style="display:none;width:100%;height:100%;object-fit:cover;border-radius:8px;" />
        </div>

        <div class="panel">
          <div class="panel-title">动作控制</div>
          <div class="action-grid">
            <button class="btn-action" data-action="walk" onclick="sendAction('walk')">
              <span class="act-icon">↑</span><span class="act-label">直线行走</span>
            </button>
            <button class="btn-action" data-action="turn_left" onclick="sendAction('turn_left')">
              <span class="act-icon">↺</span><span class="act-label">左转</span>
            </button>
            <button class="btn-action" data-action="turn_right" onclick="sendAction('turn_right')">
              <span class="act-icon">↻</span><span class="act-label">右转</span>
            </button>
            <button class="btn-action" data-action="wave" onclick="sendAction('wave')">
              <span class="act-icon">👋</span><span class="act-label">挥手</span>
            </button>
            <button class="btn-action" data-action="squat" onclick="sendAction('squat')">
              <span class="act-icon">↓</span><span class="act-label">下蹲</span>
            </button>
            <button class="btn-action" data-action="avoid" onclick="sendAction('avoid')">
              <span class="act-icon">▶</span><span class="act-label">视觉避障</span>
            </button>
          </div>
          <button class="btn-estop" onclick="emergencyStop()">◼ 紧急停止 E-STOP</button>
        </div>

        <div class="panel">
          <div class="panel-title">任务控制</div>
          <div class="task-row">
            <button class="btn-task start" onclick="taskControl('start')">▶ 启动</button>
            <button class="btn-task pause" onclick="taskControl('pause')">⏸ 暂停</button>
            <button class="btn-task resume" onclick="taskControl('resume')">⏵ 继续</button>
            <button class="btn-task stop" onclick="taskControl('stop')">⏹ 停止</button>
          </div>
          <div class="task-progress">
            <div class="task-name" id="task-name">待机中</div>
            <div class="progress-track"><div class="progress-bar" id="task-bar" style="width:0%"></div></div>
            <div class="task-meta">
              <span>步骤: <b id="action-count">0</b> / <b id="total-actions">0</b></span>
              <span>时长: <b id="task-duration">0s</b></span>
            </div>
          </div>
        </div>
      </section>

      <!-- RIGHT: Log + Chart -->
      <aside class="sidebar right">
        <div class="panel">
          <div class="panel-title">实时数据</div>
          <canvas id="chart" width="260" height="140"></canvas>
        </div>

        <div class="panel log-panel">
          <div class="panel-title">
            系统日志
            <span class="log-btns">
              <button onclick="clearLog()">清空</button>
              <button onclick="exportLog()">导出</button>
            </span>
          </div>
          <div class="log-filters">
            <button class="filter active" onclick="setFilter('ALL')">全部</button>
            <button class="filter" onclick="setFilter('INFO')">INFO</button>
            <button class="filter" onclick="setFilter('WARN')">WARN</button>
            <button class="filter" onclick="setFilter('ERROR')">ERROR</button>
          </div>
          <div class="log-area" id="log-area"></div>
        </div>
      </aside>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
