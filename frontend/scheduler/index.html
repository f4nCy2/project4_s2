<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Scheduler — 任务调度系统</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="logo">
        <span class="logo-icon">◼</span>
        <span class="logo-text">TASK SCHEDULER</span>
      </div>
      <div class="topbar-center">
        <span class="conn" id="conn-indicator">
          <span class="conn-dot" id="conn-dot"></span>
          <span id="conn-label">连接中...</span>
        </span>
      </div>
      <div class="topbar-right">
        <a href="/control" class="nav-link">← 控制面板</a>
        <span class="time" id="clock">--:--:--</span>
      </div>
    </header>

    <div class="main">
      <!-- LEFT: NLP Task + Manual Create -->
      <aside class="sidebar">
        <!-- 自然语言任务 -->
        <div class="panel">
          <div class="panel-title">🗣 自然语言任务 (2D SLAM)</div>
          <div class="form-group">
            <label>任务描述</label>
            <input type="text" id="nlp-input" placeholder="例如：去客厅拿杯子、前往卧室取物品" value="去客厅拿杯子" />
          </div>
          <div class="form-group">
            <label>当前位置</label>
            <select id="nlp-current-location">
              <option value="客厅">客厅 (0, 0)</option>
              <option value="卧室">卧室 (5, 3)</option>
              <option value="玄关">玄关 (1.5, -2)</option>
              <option value="厨房">厨房 (-3, 2.5)</option>
              <option value="走廊">走廊 (2, 0)</option>
              <option value="卫生间">卫生间 (6, -1.5)</option>
              <option value="阳台">阳台 (-2, 5)</option>
            </select>
          </div>
          <button class="btn-primary" onclick="sendNLPTask()">🚀 解析并下发导航任务</button>
          <div class="nlp-result" id="nlp-result" style="display:none;">
            <div class="nlp-title" id="nlp-task-name"></div>
            <div class="nlp-coords">
              <div><span class="coord-label">起点:</span> <span id="nlp-start"></span></div>
              <div><span class="coord-label">终点:</span> <span id="nlp-target"></span></div>
              <div><span class="coord-label">航向:</span> <span id="nlp-yaw"></span></div>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-title">创建动作任务</div>
          <div class="form-group">
            <label>任务名称</label>
            <input type="text" id="task-name-input" placeholder="例如：避障测试任务" value="避障测试任务" />
          </div>
          <div class="form-group">
            <label>优先级</label>
            <select id="task-priority">
              <option value="NORMAL">NORMAL</option>
              <option value="HIGH">HIGH</option>
              <option value="LOW">LOW</option>
              <option value="EMERGENCY">EMERGENCY</option>
            </select>
          </div>
          <div class="form-group">
            <label>动作序列</label>
            <div id="action-list">
              <div class="action-item">
                <select class="act-type">
                  <option value="walk_straight">直线行走</option>
                  <option value="turn_in_place">原地掉头</option>
                  <option value="turn_walk">转弯行走</option>
                  <option value="walk_backward">后退</option>
                  <option value="sidestep">侧移</option>
                  <option value="stop">停止</option>
                  <option value="avoid_obstacle">视觉避障</option>
                </select>
                <input type="text" class="act-params" placeholder='{"distance":2,"speed":0.8}' value='{"distance":2,"speed":0.8}' />
                <button class="btn-remove" onclick="this.parentElement.remove()">×</button>
              </div>
            </div>
            <button class="btn-add" onclick="addActionRow()">+ 添加动作</button>
          </div>
          <button class="btn-primary" onclick="createTask()">创建任务</button>
        </div>

        <div class="panel">
          <div class="panel-title">快捷任务</div>
          <button class="btn-quick" onclick="quickTask('直线行走2m', [{type:'walk_straight',params:{distance:2,speed:0.8}}])">直线行走 2m</button>
          <button class="btn-quick" onclick="quickTask('左转+直行', [{type:'turn_in_place',params:{angle:45,direction:'left',speed:0.3}},{type:'walk_straight',params:{distance:1,speed:0.8}}])">左转 45° + 直行</button>
          <button class="btn-quick" onclick="quickTask('避障绕行', [{type:'avoid_obstacle',params:{}}])">视觉避障</button>
          <button class="btn-quick" onclick="quickTask('紧急停止', [{type:'stop',params:{emergency:true}}])">紧急停止</button>
        </div>
      </aside>

      <!-- CENTER: Nav Status + Task List -->
      <section class="center">
        <!-- 2D 导航状态 -->
        <div class="panel">
          <div class="panel-title">
            📍 2D 导航状态
            <span class="panel-actions">
              <button onclick="refreshNavSummary()">刷新</button>
              <button onclick="cancelNavTask()" style="background:#ef4444;color:#fff;">取消导航</button>
            </span>
          </div>
          <div id="nav-status-area">
            <div class="empty-state">暂无活跃导航任务</div>
          </div>
        </div>

        <!-- 2D 坐标实时显示 -->
        <div class="panel">
          <div class="panel-title">📐 实时坐标追踪</div>
          <div class="coord-tracker" id="coord-tracker">
            <div class="coord-row">
              <span class="coord-label">当前坐标:</span>
              <span class="coord-val" id="live-x">--</span>, <span class="coord-val" id="live-y">--</span>
            </div>
            <div class="coord-row">
              <span class="coord-label">航向角:</span>
              <span class="coord-val" id="live-yaw">--</span>°
            </div>
            <div class="coord-row">
              <span class="coord-label">距终点:</span>
              <span class="coord-val" id="live-dist">--</span>m
            </div>
            <div class="coord-row">
              <span class="coord-label">进度:</span>
              <span class="coord-val" id="live-progress">0</span>%
            </div>
            <div class="nav-progress-track">
              <div class="nav-progress-bar" id="nav-progress-bar" style="width:0%"></div>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-title">
            任务队列
            <span class="panel-actions">
              <button onclick="refreshTasks()">刷新</button>
              <button onclick="clearCompleted()">清除已完成</button>
            </span>
          </div>
          <div class="table-wrap">
            <table class="task-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>名称</th>
                  <th>状态</th>
                  <th>优先级</th>
                  <th>步骤</th>
                  <th>创建时间</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="task-tbody">
                <tr class="empty"><td colspan="7">暂无任务</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <div class="panel">
          <div class="panel-title">当前任务</div>
          <div id="current-task-info">
            <div class="empty-state">暂无运行中的任务</div>
          </div>
        </div>
      </section>

      <!-- RIGHT: Execution Log + Avoidance Log -->
      <aside class="sidebar right">
        <div class="panel">
          <div class="panel-title">🚨 避障记录</div>
          <div class="avoidance-log" id="avoidance-log">
            <div class="empty-state">无避障事件</div>
          </div>
        </div>

        <div class="panel log-panel">
          <div class="panel-title">调度日志</div>
          <div class="log-area" id="log-area"></div>
        </div>
      </aside>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
